# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: dremio-cli
  version: 2.1.0
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dremio_cli-${{ version }}.tar.gz
  sha256: a1b25e29a3f0364a95f427aacfba6c98631062b0d4105eb96d31d010a883b34d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - dremio = drs.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - typer >=0.9
    - httpx >=0.27
    - pyyaml >=6
    - pydantic >=2
    - rich >=13
    - prompt-toolkit >=3.0
tests:
  - python:
      imports:
        - drs.client
        - drs.auth
      pip_check: true
      python_version:
        - ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - dremio --help

about:
  summary: A comprehensive command-line interface for Dremio Cloud.
  description: Dremio developer CLI, and AI agent skills — query, catalog, schema, reflections, jobs, and access for Dremio Cloud.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/dremio/cli
  homepage: https://pypi.org/project/dremio-cli/
  documentation: https://docs.dremio.com/dremio-cloud/api/

extra:
  recipe-maintainers:
    - rxm7706
